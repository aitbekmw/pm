volumes:
  postgres_data:

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    image: ${CI_REGISTRY_IMAGE}:${IMAGE_TAG:-latest}
    container_name: api
    env_file:
      - .env
    ports:
    - "${PORT:-8000}:8000"
    depends_on:
      - postgres
    restart: unless-stopped
