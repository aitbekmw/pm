services:
  telegram-compare-bot:
    build: .
    container_name: telegram-compare-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:?ELEVENLABS_API_KEY is required}
      WHISPER_SERVER_URL: ${WHISPER_SERVER_URL:-http://10.0.10.3:8000/transcribe}
      ELEVENLABS_STT_MODEL: ${ELEVENLABS_STT_MODEL:-scribe_v2}
      ELEVENLABS_DIARIZE: ${ELEVENLABS_DIARIZE:-true}
      ELEVENLABS_TAG_AUDIO_EVENTS: ${ELEVENLABS_TAG_AUDIO_EVENTS:-true}
      ELEVENLABS_TIMESTAMPS_GRANULARITY: ${ELEVENLABS_TIMESTAMPS_GRANULARITY:-word}
      ELEVENLABS_NUM_SPEAKERS: ${ELEVENLABS_NUM_SPEAKERS:-0}
      ELEVENLABS_KEYTERMS: ${ELEVENLABS_KEYTERMS:-}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      BOT_MAX_FILE_MB: ${BOT_MAX_FILE_MB:-50}
      BOT_REQUEST_TIMEOUT_SECONDS: ${BOT_REQUEST_TIMEOUT_SECONDS:-900}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    entrypoint: ["python", "-m", "src.telegram_compare_bot"]
    restart: unless-stopped
