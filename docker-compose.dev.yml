version: '3.8'

volumes:
  postgres_data_dev:
  redis_data_dev:

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pm-assistant-db-dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: pm_user
      POSTGRES_PASSWORD: pm_password
      POSTGRES_DB: pm_assistant
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pm-assistant-redis-dev
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Для локальной разработки запускаем только БД и Redis
  # API и Worker запускаются локально через uv

