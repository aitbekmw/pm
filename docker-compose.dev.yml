version: '3.8'

volumes:
  postgres_data_dev:
  redis_data_dev:

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pm-assistant-db-dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pm-assistant-redis-dev
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: pm-assistant-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    restart: unless-stopped

  api:
    build:
      context: .
      target: runtime
    container_name: pm-assistant-api-dev
    env_file:
      - .env
    environment:
      - RUN_BOT=false
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runtime
    container_name: pm-assistant-worker-dev
    env_file:
      - .env
    environment:
      - RUN_BOT=true
    volumes:
      - ./src:/app/src
    entrypoint: ["/app/worker.sh"]
    depends_on:
      - postgres
      - redis
    restart: unless-stopped